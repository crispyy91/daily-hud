<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DAILY_HUD | Tactical Planner v3.5</title>
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">

    <style>
        :root {
            /* Light Theme (Default) */
            --bg: #f0f4f8;
            --card: #ffffff;
            --primary: #008080;
            --primary-glow: rgba(0, 128, 128, 0.2);
            --text: #1a2b3c;
            --text-dim: #7f8c9d;
            --border: #dbe2e8;
            --tracker: #8e44ad;
            --bad: #e67e22;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg: #0a0f14;
            --card: #121a21;
            --primary: #00f2f2;
            --primary-glow: rgba(0, 242, 242, 0.3);
            --text: #e0e6ed;
            --text-dim: #64748b;
            --border: #1e293b;
            --tracker: #bf7af0;
            --bad: #ff8c00;
        }

        body {
            font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 12px; min-height: 100vh; -webkit-font-smoothing: antialiased;
            transition: background 0.3s, color 0.3s;
        }

        body::before {
            content: " "; display: block; position: fixed; top: 0; left: 0; bottom: 0; right: 0;
            background-image: linear-gradient(0deg, rgba(255,255,255,0.05) 50%, transparent 50%);
            z-index: 9999; background-size: 100% 4px; pointer-events: none; opacity: 0.1;
        }

        #watermark {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) rotate(-20deg);
            font-size: 10vw; font-weight: 900; color: var(--primary); opacity: 0.03;
            white-space: nowrap; z-index: -1; pointer-events: none; font-family: 'Audiowide', sans-serif;
        }

        header { padding: 15px; display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--border); margin-bottom: 15px; background: var(--card); border-radius: 8px;}
        .logo { font-family: 'Audiowide', sans-serif; font-size: 1.2rem; letter-spacing: 1px; color: var(--primary); }
        
        .user-level { text-align: right; }
        .lvl-text { font-family: 'Orbitron'; font-size: 0.7rem; color: var(--text-dim); }
        .lvl-val { font-family: 'Audiowide'; font-size: 1.4rem; color: var(--text); }

        .progress-container { width: 100%; background: var(--border); height: 10px; margin-bottom: 15px; border-radius: 5px; overflow: hidden; border: 1px solid var(--border); }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.8s ease; box-shadow: 0 0 10px var(--primary-glow); }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 10px; }
        .btn-action, .btn-icon {
            background: var(--card); color: var(--primary); border: 1px solid var(--primary);
            padding: 10px 15px; font-family: 'Orbitron'; font-size: 0.7rem; cursor: pointer; font-weight: 700;
            text-transform: uppercase; transition: 0.2s; border-radius: 5px;
            clip-path: polygon(5px 0, 100% 0, 100% calc(100% - 5px), calc(100% - 5px) 100%, 0 100%, 0 5px);
        }
        .btn-action:hover, .btn-icon:hover { background: var(--primary); color: var(--bg); }

        .tabs { display: flex; overflow-x: auto; gap: 8px; flex-grow: 1; padding-bottom: 5px; scrollbar-width: none; }
        .tab-btn {
            background: var(--card); border: 1px solid var(--border); padding: 8px 16px;
            color: var(--text-dim); font-size: 0.65rem; text-transform: uppercase;
            cursor: pointer; font-family: 'Orbitron'; border-radius: 5px;
        }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); }

        .table-container { 
            background: var(--card); border: 1px solid var(--border); max-height: 55vh; overflow: hidden; display: flex; flex-direction: column;
            border-radius: 8px; clip-path: polygon(0 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%);
        }
        .scroll-area { overflow: auto; flex-grow: 1;}
        table { width: 100%; border-collapse: collapse; min-width: 650px; }
        th { background: var(--bg); padding: 15px 5px; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; position: sticky; top: 0; z-index: 5; font-family: 'Orbitron'; }
        td { padding: 12px 5px; border-bottom: 1px solid var(--border); text-align: center; }

        .sticky-col { position: sticky; left: 0; background: var(--card) !important; border-right: 1px solid var(--border) !important; font-family: 'Orbitron'; font-weight: 700; z-index: 6; }
        
        input[type="checkbox"] {
            appearance: none; width: 26px; height: 26px; border: 2px solid var(--border);
            background: var(--card); cursor: pointer; position: relative; border-radius: 6px;
        }
        input[type="checkbox"]:checked { background: var(--primary); border-color: var(--primary); }
        input[type="checkbox"]:checked::after { content: "✓"; color: var(--card); position: absolute; left: 7px; top: 3px; font-weight: 900; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin-top: 15px; }
        .stat-card { background: var(--card); border: 1px solid var(--border); padding: 15px 5px; text-align: center; border-radius: 5px; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 10000; padding: 15px; align-items: center; justify-content: center; backdrop-filter: blur(5px);}
        .modal-box { background: var(--card); padding: 25px; width: 100%; max-width: 450px; border-radius: 10px; border: 1px solid var(--primary); }
        
        textarea, input[type="text"], select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); padding: 12px; margin-bottom: 15px; font-family: 'Orbitron'; border-radius: 5px; }

        #toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--primary); color: var(--bg); padding: 15px 30px; font-family: 'Audiowide'; transition: 0.4s; z-index: 9999; border-radius: 5px; }
        #toast.show { bottom: 30px; }
        .note-dot { width: 6px; height: 6px; background: var(--primary); margin: 3px auto 0; display: none; border-radius: 50%; }
        .has-note .note-dot { display: block; }
    </style>
</head>
<body data-theme="dark">

    <div id="watermark">SYS.2026</div>

    <header>
        <div class="logo">DAILY_HUD <br><span id="ui-version" style="font-size: 0.5rem; color: var(--text-dim); font-family: 'Orbitron'">v3.5.MULTI</span></div>
        <div class="user-level">
            <div class="lvl-text" id="ui-sys-lvl">SYSTEM LEVEL</div>
            <div class="lvl-val" id="sys-lvl">01</div>
        </div>
    </header>

    <div class="progress-container">
        <div class="progress-bar" id="month-progress"></div>
    </div>

    <div class="top-bar">
        <button class="btn-icon" onclick="openSettings()" id="ui-config">[ KONFIG_SYS ]</button>
        <div class="tabs" id="month-tabs"></div>
        <button class="btn-action" onclick="scrollToToday()" id="ui-sync">SYNC_DZISIAJ</button>
    </div>

    <div class="table-container">
        <div class="scroll-area" id="main-scroll">
            <table>
                <thead><tr id="thead"></tr></thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
    </div>

    <div class="stats-grid" id="stats-area"></div>
    <div id="toast">SYSTEM READY</div>

    <div id="modal-note" class="modal">
        <div class="modal-box">
            <div class="modal-header" style="display:flex; justify-content: space-between; margin-bottom:20px;">
                <h3 class="modal-title" id="ui-raport-title">RAPORT DZIENNY</h3>
                <button onclick="closeModal('modal-note')" style="background:none; border:none; color:var(--text); font-size:1.5rem; cursor:pointer;">×</button>
            </div>
            <textarea id="note-input"></textarea>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="saveNote()" id="ui-save-log">ZATWIERDŹ LOG</button>
        </div>
    </div>

    <div id="modal-settings" class="modal">
        <div class="modal-box">
            <h3 class="modal-title" id="ui-settings-title" style="color:var(--primary); font-family:'Audiowide'; margin-bottom:20px;">KONFIGURACJA</h3>
            
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="btn-icon" style="flex:1;" onclick="toggleTheme()">MOTYW L/D</button>
                <button class="btn-icon" style="flex:1;" onclick="toggleLang()">JĘZYK PL/EN</button>
            </div>

            <div id="targets-editor"></div>
            <button class="btn-icon" style="width:100%; margin-bottom: 20px; border-style: dashed;" onclick="addNewTargetField()" id="ui-add-vector">+ DODAJ WEKTOR</button>
            <button class="btn-action" style="width:100%; padding:15px;" onclick="saveTargets()" id="ui-save-proto">ZAPISZ PROTOKÓŁ</button>

            <h3 style="color:var(--text-dim); font-size:0.8rem; margin-top:20px;" id="ui-db-title">BAZA DANYCH</h3>
            <div style="display: flex; gap: 10px;">
                <button class="btn-icon" style="flex:1;" onclick="exportData()" id="ui-export">EKSPORT</button>
                <button class="btn-icon" style="flex:1;" onclick="document.getElementById('import-file').click()" id="ui-import">IMPORT</button>
                <input type="file" id="import-file" style="display:none" accept=".json" onchange="importData(event)">
            </div>
        </div>
    </div>

    <script>
        const TRANSLATIONS = {
            pl: {
                sys_lvl: "POZIOM SYSTEMU",
                config: "[ KONFIG_SYS ]",
                sync: "SYNC_DZISIAJ",
                raport: "RAPORT DZIENNY",
                save_log: "ZATWIERDŹ LOG",
                settings: "KONFIGURACJA",
                add_vector: "+ DODAJ WEKTOR",
                save_proto: "ZAPISZ PROTOKÓŁ",
                db: "BAZA DANYCH",
                export: "EKSPORT",
                import: "IMPORT",
                ready: "SYSTEM GOTOWY",
                saved: "ZAPISANO",
                target_placeholder: "Cel",
                months: ["Styczeń", "Luty", "Marzec", "Kwiecień", "Maj", "Czerwiec", "Lipiec", "Sierpień", "Wrzesień", "Październik", "Listopad", "Grudzień"]
            },
            en: {
                sys_lvl: "SYSTEM LEVEL",
                config: "[ SYS_CONFIG ]",
                sync: "SYNC_TODAY",
                raport: "DAILY REPORT",
                save_log: "SUBMIT LOG",
                settings: "CONFIGURATION",
                add_vector: "+ ADD VECTOR",
                save_proto: "SAVE PROTOCOL",
                db: "DATABASE",
                export: "EXPORT",
                import: "IMPORT",
                ready: "SYSTEM READY",
                saved: "LOG SAVED",
                target_placeholder: "Target",
                months: ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"]
            }
        };

        let currentLang = localStorage.getItem('cfg_lang') || 'pl';
        let targets = [];
        let currM = new Date().getMonth();
        let activeNoteKey = "";

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.frequency.setValueAtTime(type === 'good' ? 800 : 300, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) {}
        }

        function updateUIStrings() {
            const lang = TRANSLATIONS[currentLang];
            document.getElementById('ui-sys-lvl').innerText = lang.sys_lvl;
            document.getElementById('ui-config').innerText = lang.config;
            document.getElementById('ui-sync').innerText = lang.sync;
            document.getElementById('ui-raport-title').innerText = lang.raport;
            document.getElementById('ui-save-log').innerText = lang.save_log;
            document.getElementById('ui-settings-title').innerText = lang.settings;
            document.getElementById('ui-add-vector').innerText = lang.add_vector;
            document.getElementById('ui-save-proto').innerText = lang.save_proto;
            document.getElementById('ui-db-title').innerText = lang.db;
            document.getElementById('ui-export').innerText = lang.export;
            document.getElementById('ui-import').innerText = lang.import;
        }

        function toggleTheme() {
            const theme = document.body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('cfg_theme', theme);
        }

        function toggleLang() {
            currentLang = currentLang === 'pl' ? 'en' : 'pl';
            localStorage.setItem('cfg_lang', currentLang);
            updateUIStrings();
            renderTabs();
            renderTable();
            triggerToast(TRANSLATIONS[currentLang].ready);
        }

        function boot() {
            document.body.setAttribute('data-theme', localStorage.getItem('cfg_theme') || 'dark');
            loadTargets();
            updateUIStrings();
            renderTabs();
            renderTable();
            triggerToast(TRANSLATIONS[currentLang].ready);
        }

        function loadTargets() {
            const saved = localStorage.getItem('cfg_targets_26');
            targets = saved ? JSON.parse(saved) : [
                { id: 'tr', ico: '🏋️', lab: 'Trening', type: 'good' },
                { id: 'wo', ico: '💧', lab: 'Woda', type: 'good' },
                { id: 'uz', ico: '🍺', lab: 'Zło', type: 'bad' }
            ];
        }

        function renderTabs() {
            const tabs = document.getElementById('month-tabs');
            tabs.innerHTML = "";
            TRANSLATIONS[currentLang].months.forEach((m, i) => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${i === currM ? 'active' : ''}`;
                btn.innerText = `M${(i+1).toString().padStart(2, '0')}`;
                btn.onclick = () => { currM = i; renderTabs(); renderTable(); };
                tabs.appendChild(btn);
            });
        }

        function renderTable() {
            const head = document.getElementById('thead');
            head.innerHTML = `<th class="sticky-col">${currentLang === 'pl' ? 'Dzień' : 'Day'}</th>`;
            targets.forEach(t => head.innerHTML += `<th>${t.ico}<br>${t.lab}</th>`);

            const body = document.getElementById('tbody');
            body.innerHTML = "";
            const daysCount = new Date(2026, currM + 1, 0).getDate();
            let weeklySums = {}; targets.forEach(t => weeklySums[t.id] = 0);

            for (let d = 1; d <= daysCount; d++) {
                const date = new Date(2026, currM, d);
                const tr = document.createElement('tr');
                tr.id = `day-row-${d}`;
                const noteKey = `n26_${currM}_${d}`;
                const hasNote = localStorage.getItem(noteKey) ? 'has-note' : '';

                let html = `<td class="sticky-col ${hasNote}" onclick="openNoteModal(${d})">${d.toString().padStart(2,'0')}<span>${date.toLocaleDateString(currentLang,{weekday:'short'}).toUpperCase()}</span><div class="note-dot"></div></td>`;
                targets.forEach(t => {
                    const key = `c26_${currM}_${d}_${t.id}`;
                    const isChecked = localStorage.getItem(key) === '1';
                    if (isChecked) weeklySums[t.id]++;
                    html += `<td><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="handleCheck(${d},'${t.id}',this.checked, '${t.type}')"></td>`;
                });
                tr.innerHTML = html;
                body.appendChild(tr);

                if (date.getDay() === 0 || d === daysCount) {
                    const sep = document.createElement('tr');
                    sep.style.background = "var(--primary-glow)";
                    let sumHtml = `<td class="sticky-col">W</td>`;
                    targets.forEach(t => {
                        sumHtml += `<td>${weeklySums[t.id] || '-'}</td>`;
                        weeklySums[t.id] = 0;
                    });
                    sep.innerHTML = sumHtml;
                    body.appendChild(sep);
                }
            }
            updateEngine();
        }

        function handleCheck(d, id, val, type) {
            playSound(val ? type : 'neutral');
            localStorage.setItem(`c26_${currM}_${d}_${id}`, val ? '1' : '0');
            updateEngine();
        }

        function updateEngine() {
            let exp = 0;
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('c26_') && localStorage.getItem(key) === '1') exp++;
            }
            document.getElementById('sys-lvl').innerText = (Math.floor(exp / 10) + 1).toString().padStart(2, '0');
            
            const area = document.getElementById('stats-area');
            area.innerHTML = "";
            targets.forEach(t => {
                let count = 0;
                for(let d=1; d<=31; d++) if(localStorage.getItem(`c26_${currM}_${d}_${t.id}`) === '1') count++;
                area.innerHTML += `<div class="stat-card"><span style="font-family:Audiowide; font-size:1.2rem;">${count}</span><br><small style="color:var(--text-dim)">${t.lab}</small></div>`;
            });
        }

        function openNoteModal(d) {
            activeNoteKey = `n26_${currM}_${d}`;
            document.getElementById('note-input').value = localStorage.getItem(activeNoteKey) || "";
            document.getElementById('modal-note').style.display = 'flex';
        }

        function saveNote() {
            localStorage.setItem(activeNoteKey, document.getElementById('note-input').value);
            closeModal('modal-note'); renderTable();
        }

        function openSettings() {
            const editor = document.getElementById('targets-editor');
            editor.innerHTML = "";
            targets.forEach(t => addTargetRow(editor, t.id, t.ico, t.lab, t.type));
            document.getElementById('modal-settings').style.display = 'flex';
        }

        function addTargetRow(container, id, ico, lab, type) {
            const div = document.createElement('div');
            div.dataset.id = id || Date.now();
            div.style.display = "flex"; div.style.gap = "5px";
            div.innerHTML = `
                <input type="text" value="${ico}" style="width:50px">
                <input type="text" value="${lab}" style="flex:1">
                <select style="width:auto">
                    <option value="good" ${type==='good'?'selected':''}>+</option>
                    <option value="bad" ${type==='bad'?'selected':''}>-</option>
                </select>
                <button onclick="this.parentElement.remove()" style="color:var(--bad); background:none; border:none; cursor:pointer">X</button>
            `;
            container.appendChild(div);
        }

        function addNewTargetField() { addTargetRow(document.getElementById('targets-editor'), '', '🎯', '', 'good'); }

        function saveTargets() {
            const newTargets = [];
            document.getElementById('targets-editor').childNodes.forEach(row => {
                const inputs = row.querySelectorAll('input, select');
                if(inputs[1].value) newTargets.push({id: row.dataset.id, ico: inputs[0].value, lab: inputs[1].value, type: inputs[2].value});
            });
            targets = newTargets;
            localStorage.setItem('cfg_targets_26', JSON.stringify(targets));
            closeModal('modal-settings'); renderTable();
        }

        function scrollToToday() {
            const d = new Date().getDate();
            const el = document.getElementById(`day-row-${d}`);
            if(el) el.scrollIntoView({behavior: "smooth", block: "center"});
        }

        function triggerToast(txt) {
            const t = document.getElementById('toast');
            t.innerText = txt; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function exportData() {
            const data = {};
            for(let i=0; i<localStorage.length; i++) data[localStorage.key(i)] = localStorage.getItem(localStorage.key(i));
            const blob = new Blob([JSON.stringify(data)], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'daily_hud_backup.json'; a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                const data = JSON.parse(ev.target.result);
                Object.keys(data).forEach(k => localStorage.setItem(k, data[k]));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        boot();
    </script>
</body>
</html>
